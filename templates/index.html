<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Parser & Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .output-section {
            display: none;
        }

        .output-section.active {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .output-section.active .output-card:nth-child(3),
        .output-section.active .output-card:nth-child(4) {
            grid-column: span 1;
        }

        .output-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .output-card h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1.2em;
        }

        .code-output {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .structure-list {
            background: #f5f5f5;
            border-radius: 5px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .structure-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .structure-item:last-child {
            border-bottom: none;
        }

        .item-label {
            color: #667eea;
            font-weight: 600;
            font-size: 0.95em;
        }

        .item-value {
            color: #333;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-content,
            .output-section.active {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            textarea {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <text-align: center;>
            <h1>🔍 Advanced Code Analyzer</h1>
            <p>Analyze Python code with AST parsing, error detection & AI suggestions</p>
            <a href="/story" style="display:inline-block; margin-top:12px; padding:10px 24px; border-radius:25px; background:linear-gradient(135deg,#f6d365,#fda085); color:#1a1a2e; font-weight:bold; text-decoration:none;">✨ Try Story Forge</a>
        </header>

        <div class="main-content">
            <div class="card">
                <h2>Input Code</h2>
                <textarea id="codeInput" placeholder="Paste your Python code here..."></textarea>
                <div style="margin-top: 10px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="includeAI" style="width: auto; height: auto;">
                        <span>Include AI Suggestions (requires API key)</span>
                    </label>
                </div>
                <div class="button-group">
                    <button class="btn-analyze" onclick="analyzeCode()">Analyze Code</button>
                    <button class="btn-clear" onclick="clearCode()">Clear</button>
                </div>
                <div class="error-message" id="errorMessage"></div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analyzing code...</p>
                </div>
            </div>

            <div class="card">
                <h2>Code Statistics</h2>
                <div id="statsContainer" style="display: none;">
                    <div class="stats-grid" id="statsGrid"></div>
                </div>
                <div style="color: #999; text-align: center; padding: 40px;">
                    Analyze code to see statistics
                </div>
            </div>
        </div>

        <div class="output-section" id="outputSection">
            <div class="output-card">
                <h3>Formatted Code</h3>
                <div class="code-output" id="formattedCode"></div>
            </div>

            <div class="output-card">
                <h3>Code Structure</h3>
                <div class="structure-list" id="codeStructure"></div>
            </div>

            <div class="output-card">
                <h3>⚠️ Issues Detected</h3>
                <div class="structure-list" id="issuesDetected"></div>
            </div>

            <div class="output-card" id="aiSuggestionsCard" style="display: none;">
                <h3>🤖 AI Suggestions</h3>
                <div class="structure-list" id="aiSuggestions"></div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeCode() {
            const code = document.getElementById('codeInput').value;
            const includeAI = document.getElementById('includeAI').checked;
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loading');
            const outputSection = document.getElementById('outputSection');

            // Validate input
            if (!code.trim()) {
                showError('Please enter some Python code');
                return;
            }

            // Show loading
            loadingDiv.classList.add('show');
            errorDiv.classList.remove('show');
            outputSection.classList.remove('active');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        code: code,
                        include_ai: includeAI
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Failed to analyze code');
                    loadingDiv.classList.remove('show');
                    return;
                }

                // Display results
                displayResults(data);
                loadingDiv.classList.remove('show');
                outputSection.classList.add('active');

            } catch (error) {
                showError('Error: ' + error.message);
                loadingDiv.classList.remove('show');
            }
        }

        function displayResults(data) {
            // Display formatted code
            document.getElementById('formattedCode').textContent = data.formatted_code;

            // Display structure
            const structure = data.structure;
            let structureHTML = '';

            if (structure.functions && structure.functions.length > 0) {
                structureHTML += `<div class="structure-item">
                    <div class="item-label">Functions (${structure.functions.length})</div>
                    <div class="item-value">`;
                structure.functions.forEach(func => {
                    structureHTML += `• ${func}<br>`;
                });
                structureHTML += `</div></div>`;
            }

            if (structure.classes && structure.classes.length > 0) {
                structureHTML += `<div class="structure-item">
                    <div class="item-label">Classes (${structure.classes.length})</div>
                    <div class="item-value">`;
                structure.classes.forEach(cls => {
                    structureHTML += `• ${cls}<br>`;
                });
                structureHTML += `</div></div>`;
            }

            structureHTML += `<div class="structure-item">
                <div class="item-label">Imports</div>
                <div class="item-value">${structure.imports.length} statement(s)</div>
            </div>`;

            structureHTML += `<div class="structure-item">
                <div class="item-label">Variable Assignments</div>
                <div class="item-value">${structure.assignments.length}</div>
            </div>`;

            document.getElementById('codeStructure').innerHTML = structureHTML;

            // Display issues (errors and warnings)
            let issuesHTML = '';
            const totalIssues = data.error_count + data.warning_count;
            
            if (totalIssues === 0) {
                issuesHTML = '<div style="color: #28a745; text-align: center; padding: 20px;">✓ No issues detected!</div>';
            } else {
                if (data.errors && data.errors.length > 0) {
                    data.errors.forEach(error => {
                        issuesHTML += `<div class="structure-item" style="border-left: 3px solid #dc3545; padding-left: 10px;">
                            <div class="item-label" style="color: #dc3545;">❌ Error (Line ${error.line})</div>
                            <div class="item-value">${error.message}</div>
                        </div>`;
                    });
                }
                
                if (data.warnings && data.warnings.length > 0) {
                    data.warnings.forEach(warning => {
                        issuesHTML += `<div class="structure-item" style="border-left: 3px solid #ffc107; padding-left: 10px;">
                            <div class="item-label" style="color: #ffc107;">⚠️ Warning (Line ${warning.line})</div>
                            <div class="item-value">${warning.message}</div>
                        </div>`;
                    });
                }
            }
            
            document.getElementById('issuesDetected').innerHTML = issuesHTML;

            // Display AI suggestions if available
            const aiCard = document.getElementById('aiSuggestionsCard');
            if (data.ai_suggestions) {
                document.getElementById('aiSuggestions').innerHTML = 
                    `<div style="white-space: pre-wrap; line-height: 1.6;">${data.ai_suggestions}</div>`;
                aiCard.style.display = 'block';
            } else {
                aiCard.style.display = 'none';
            }

            // Display statistics
            const stats = data.ast_stats;
            const statsContainer = document.getElementById('statsContainer');
            const statsGrid = document.getElementById('statsGrid');

            statsGrid.innerHTML = `
                <div class="stat-box">
                    <div class="stat-value">${stats.total_nodes}</div>
                    <div class="stat-label">Total AST Nodes</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${stats.unique_node_types}</div>
                    <div class="stat-label">Unique Node Types</div>
                </div>
                <div class="stat-box" style="background: ${data.error_count > 0 ? '#dc3545' : '#28a745'};">
                    <div class="stat-value">${data.error_count}</div>
                    <div class="stat-label">Errors</div>
                </div>
                <div class="stat-box" style="background: ${data.warning_count > 0 ? '#ffc107' : '#28a745'};">
                    <div class="stat-value">${data.warning_count}</div>
                    <div class="stat-label">Warnings</div>
                </div>
            `;

            statsContainer.style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearCode() {
            document.getElementById('codeInput').value = '';
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('outputSection').classList.remove('active');
            document.getElementById('statsContainer').style.display = 'none';
        }

        // Allow Enter key for analyze (Ctrl+Enter)
        document.getElementById('codeInput').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                analyzeCode();
            }
        });
    </script>
</body>
</html>
